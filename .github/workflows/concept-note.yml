name: Concept note

on:
  push:
    paths:
      - "docs/concept-note.md"
      - "docs/assets/hadox-research-labs-lockup.png"
      - "tools/concept-note/**"
      - "Makefile"
      - ".github/workflows/concept-note.yml"
  pull_request:
    paths:
      - "docs/concept-note.md"
      - "docs/assets/hadox-research-labs-lockup.png"
      - "tools/concept-note/**"
      - "Makefile"
      - ".github/workflows/concept-note.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install document toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern \
            poppler-utils \
            fonts-texgyre
          fc-cache -f
      - name: Render concept note from Markdown
        run: make concept-note-check
      - uses: actions/upload-artifact@v7
        with:
          name: concept-note-smoke-test
          path: build/concept-note.pdf
          if-no-files-found: error
